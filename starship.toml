"$schema" = 'https://starship.rs/config-schema.json'

# Rainbow powerline: rounded ends ( ) with solid  arrows
# (powerlevel10k style) transitioning between the colored segments.
format = """
[](fg:color_dir)\
$directory\
[](fg:color_dir bg:color_git)\
$git_branch\
$git_status\
[](fg:color_git bg:color_lang)\
$nodejs\
$python\
[](fg:color_lang bg:color_time)\
$time\
[](fg:color_time)\
$line_break\
$character"""

# Command duration hugs the right edge (only shows for commands over min_time).
right_format = "$cmd_duration"

add_newline = true
palette = 'rainbow'

[palettes.rainbow]
color_dir = '#DA627D'
color_git = '#FCA17D'
color_lang = '#A3BE8C'
color_time = '#86BBD8'
color_fg = '#1C1C1C'

[directory]
format = "[  $path ]($style)"
style = "fg:color_fg bg:color_dir"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
format = "[ $symbol$branch ]($style)"
style = "fg:color_fg bg:color_git"

[git_status]
format = "[$all_status$ahead_behind ]($style)"
style = "fg:color_fg bg:color_git"
modified   = "*"          # changed (unstaged) tracked files
untracked  = "+"          # new files not yet tracked
staged     = "●"          # staged, ready to commit
ahead      = "↑${count}"  # commits to push
behind     = "↓${count}"  # commits to pull
diverged   = "↕"          # both ahead and behind
conflicted = "✖"          # merge conflict
stashed    = "⚑"          # stashed changes

[nodejs]
symbol = " "
format = "[ $symbol$version ]($style)"
style = "fg:color_fg bg:color_lang"

[python]
symbol = " "
format = "[ $symbol$version ]($style)"
style = "fg:color_fg bg:color_lang"

[time]
disabled = false
time_format = "%H:%M:%S"
format = "[  $time ]($style)"
style = "fg:color_fg bg:color_time"

[cmd_duration]
min_time = 500
format = "took [ $duration]($style)"
style = "bold yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Explicitly off - too noisy for this setup.
[docker_context]
disabled = true

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true
